<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凄録（スゴロク） - 盤面</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-banner {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 盤面の外枠コンテナ */
        .board-container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border: 6px solid #000000;
            border-radius: 12px;
            padding: 40px 20px;
            box-sizing: border-box;
            box-shadow: 8px 8px 0px #000000;
            display: flex;
            flex-direction: column;
            gap: 0px; /* 行ごとの隙間をなくして密着させる */
        }

        /* 右上の「記録へ」ボタン */
        .header-actions {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .nav-button {
            border: 3px solid #000000;
            background-color: #ffffff;
            padding: 6px 16px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
        }

        /* すごろくの「行」：1行に5マス並べる */
        .board-row {
            display: flex;
            width: 100%;
        }

        /* 偶数行は右から左へ逆配置にする（CSSのrow-reverseで蛇行を表現！） */
        .board-row.reverse {
            flex-direction: row-reverse;
        }

        /* マスの基本スタイル */
        .grid-cell {
            flex: 1;
            aspect-ratio: 1 / 1; /* 正方形にする */
            border: 4px solid #000000;
            margin: -2px; /* 枠線が重なって太くなるのを防ぐ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .grid-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        /* イラストのグラデーション配色を再現 */
        .status-very-good { background-color: #ff8c00; color: #000000; }
        .status-good      { background-color: #ffb74d; color: #000000; }
        .status-so-so     { background-color: #ffe0b2; color: #000000; }
        .status-normal    { background-color: #ffffff; color: #000000; }
        .status-bad-hint  { background-color: #c5cae9; color: #000000; }
        .status-bad       { background-color: #5c6bc0; color: #ffffff; }
        .status-very-bad  { background-color: #1a237e; color: #ffffff; }

        /* 空白埋め用のダミーマスの色（まだ記録がない未来のマス） */
        .status-empty     { background-color: #e0e0e0; color: #9e9e9e; border-style: dashed; }

        .cell-date {
            font-size: 12px;
            margin-bottom: 4px;
            border-bottom: 1px solid currentColor;
        }
        .cell-comment {
            font-size: 11px;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 2行まで表示して溢れたら…にする */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <a href="index.html" class="nav-button">＜ 記録ページへ</a>
    </div>

    <div class="title-banner">
        🎲 <span id="userNameDisplay">ゲスト</span> のすごろくマップ
    </div>

    <div class="board-container" id="board"></div>

    <script>
        window.onload = function() {
            // ユーザー名の表示
            const storedName = localStorage.getItem('sugoroku_username') || "プレイヤー1";
            document.getElementById('userNameDisplay').textContent = storedName;

            // データの読み込み
            const records = JSON.parse(localStorage.getItem('sugoroku_records')) || [];
            const board = document.getElementById('board');

            // 最低でも15マス（3行分）は盤面を表示するためのダミー処理
            const displayCount = Math.max(records.length, 15);
            
            let currentRow = null;
            
            for (let i = 0; i < displayCount; i++) {
                // 5マスごとに新しい「行（Row）」を作成する
                if (i % 5 === 0) {
                    currentRow = document.createElement('div');
                    currentRow.className = 'board-row';
                    
                    // 2行目、4行目、6行目...（偶数行）は逆向き(右から左)にする
                    if (Math.floor(i / 5) % 2 === 1) {
                        currentRow.classList.add('reverse');
                    }
                    board.appendChild(currentRow);
                }

                // マス目（Cell）の作成
                const cell = document.createElement('div');
                
                if (i < records.length) {
                    // データがあるマス
                    const data = records[i];
                    cell.className = `grid-cell status-${data.status}`;
                    
                    // 日付のフォーマット（月/日 だけにする）
                    const dateObj = new Date(data.date);
                    const dateText = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                    
                    cell.innerHTML = `
                        <div class="cell-date">${dateText}</div>
                        <div class="cell-comment">${data.comment}</div>
                    `;
                    
                    // クリックしたら詳細をポップアップ（C#のイベントハンドラ登録みたいなもの）
                    cell.onclick = function() {
                        alert(`【${data.date}の記録】\n\n${data.comment}`);
                    };
                } else {
                    // データがない未来のダミーマス
                    cell.className = 'grid-cell status-empty';
                    cell.innerHTML = `<div class="cell-date">??</div><div class="cell-comment">これからの未来</div>`;
                }

                currentRow.appendChild(cell);
            }
        };
    </script>
</body>
</html>
