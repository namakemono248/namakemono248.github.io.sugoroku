<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凄録（スゴロク） - 盤面</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-banner {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .board-container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border: 6px solid #000000;
            border-radius: 12px;
            padding: 40px 20px;
            box-sizing: border-box;
            box-shadow: 8px 8px 0px #000000;
            display: flex;
            flex-direction: column;
        }

        .header-actions {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .nav-button {
            border: 3px solid #000000;
            background-color: #ffffff;
            padding: 6px 16px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
        }

        .board-row {
            display: flex;
            width: 100%;
        }
        .board-row.reverse {
            flex-direction: row-reverse;
        }

        .grid-cell {
            flex: 1;
            aspect-ratio: 1 / 1;
            border: 4px solid #000000;
            margin: -2px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .grid-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .status-very-good { background-color: #ff8c00; color: #000000; }
        .status-good      { background-color: #ffb74d; color: #000000; }
        .status-so-so     { background-color: #ffe0b2; color: #000000; }
        .status-normal    { background-color: #ffffff; color: #000000; }
        .status-bad-hint  { background-color: #c5cae9; color: #000000; }
        .status-bad       { background-color: #5c6bc0; color: #ffffff; }
        .status-very-bad  { background-color: #1a237e; color: #ffffff; }
        .status-empty     { background-color: #e0e0e0; color: #9e9e9e; border-style: dashed; }

        .cell-date {
            font-size: 12px;
            margin-bottom: 4px;
            border-bottom: 1px solid currentColor;
        }
        .cell-comment {
            font-size: 11px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <a href="index.html" class="nav-button">＜ 記録ページへ</a>
    </div>

    <div class="title-banner">
        🎲 <span id="userNameDisplay">ゲスト</span> のすごろくマップ
    </div>

    <div class="board-container" id="board"></div>

    <script>
        window.onload = function() {
            document.getElementById('userNameDisplay').textContent = localStorage.getItem('sugoroku_username') || "プレイヤー1";

            const records = JSON.parse(localStorage.getItem('sugoroku_records')) || [];
            const board = document.getElementById('board');

            // 1. 各ステータスの進むマス数（リクエスト通りに設定！）
            const stepMap = {
                'very-good': 3,  // かなりできた => 3マス
                'good': 2,       // できた => 2マス
                'so-so': 1,      // すこしでき => 1マス
                'normal': 1,     // ふつう => 1マス
                'bad-hint': 1,   // すこし失敗 => 1マス
                'bad': 1,        // 失敗 => 1マス
                'very-bad': 1    // かなり失敗 => 1マス
            };

            let finalCellsData = [];
            let lastProcessedDate = ""; // 直前の「投稿の元の日付」を覚えておく変数
            
            // 2. 蓄積された記録からマス目をシミュレート
            records.forEach(data => {
                const steps = stepMap[data.status] || 1;
                
                // 同じ日に複数回投稿されたかどうかの判定
                let isSameDayCount = (data.date === lastProcessedDate);
                lastProcessedDate = data.date;

                const dateObj = new Date(data.date);
                let dateText = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                
                // 1日の中で2回目以降の投稿なら、日付の後ろに「+」をつけて区別する
                if (isSameDayCount) {
                    dateText += "+";
                }

                // 倍率分のマスを生成
                for (let s = 0; s < steps; s++) {
                    finalCellsData.push({
                        dateLabel: s === 0 ? dateText : "トコトコ",
                        comment: s === 0 ? data.comment : "👣",
                        status: data.status,
                        fullComment: data.comment,
                        fullDate: data.date
                    });
                }
            });

            // 最低15マス表示
            const displayCount = Math.max(finalCellsData.length, 15);
            let currentRow = null;
            
            for (let i = 0; i < displayCount; i++) {
                if (i % 5 === 0) {
                    currentRow = document.createElement('div');
                    currentRow.className = 'board-row';
                    if (Math.floor(i / 5) % 2 === 1) {
                        currentRow.classList.add('reverse');
                    }
                    board.appendChild(currentRow);
                }

                const cell = document.createElement('div');
                
                if (i < finalCellsData.length) {
                    const cellData = finalCellsData[i];
                    cell.className = `grid-cell status-${cellData.status}`;
                    
                    cell.innerHTML = `
                        <div class="cell-date">${cellData.dateLabel}</div>
                        <div class="cell-comment">${cellData.comment}</div>
                    `;
                    
                    cell.onclick = function() {
                        alert(`【${cellData.fullDate} の記録】\n\n${cellData.fullComment}`);
                    };
                } else {
                    cell.className = 'grid-cell status-empty';
                    cell.innerHTML = `<div class="cell-date">??</div><div class="cell-comment">これからの未来</div>`;
                }

                currentRow.appendChild(cell);
            }
        };
    </script>
</body>
</html>
